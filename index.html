<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cafe Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f3ef;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #6b4f4f;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        h2 {
            border-bottom: 2px solid #6b4f4f;
            padding-bottom: 5px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .price {
            color: #6b4f4f;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #6b4f4f;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>☕ My Cafe</h1>
    <p>Fresh & Delicious</p>
</header>

<div class="container">

    <h2>Coffee</h2>
    <div class="menu-item">
        <span>Espresso</span>
        <span class="price">₹120</span>
    </div>
    <div class="menu-item">
        <span>Cappuccino</span>
        <span class="price">₹180</span>
    </div>
    <div class="menu-item">
        <span>Latte</span>
        <span class="price">₹200</span>
    </div>

    <h2>Snacks</h2>
    <div class="menu-item">
        <span>Sandwich</span>
        <span class="price">₹150</span>
    </div>
    <div class="menu-item">
        <span>French Fries</span>
        <span class="price">₹100</span>
    </div>
    <div class="menu-item">
        <span>Brownie</span>
        <span class="price">₹130</span>
    </div>

</div>

<footer>
    <p>© 2026 My Cafe</p>
</footer>

</body>
</html>
